<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arman Deri</title>

<link rel="stylesheet" href="style.css"/>
</head>

<body>

<header class="nav">
  <div class="logo">ARMAN DERİ</div>

  <div class="nav-actions">
    <button class="btn">Tema</button>
    <button class="btn">Sepet</button>
  </div>
</header>

<section class="hero">
  <h1>Zamansız Lüks</h1>
  <p>Minimal tasarım. Maksimum kalite. Premium deri koleksiyonları.</p>
</section>

<section class="container">

  <div class="grid">

    <div class="card">
      <h3>Deri Ceket</h3>
      <p class="price">12.999 ₺</p>
      <button class="btn primary">Sepete Ekle</button>
    </div>

    <div class="card">
      <h3>Deri Mont</h3>
      <p class="price">18.999 ₺</p>
      <button class="btn primary">Sepete Ekle</button>
    </div>

    <div class="card">
      <h3>Deri Çanta</h3>
      <p class="price">8.499 ₺</p>
      <button class="btn primary">Sepete Ekle</button>
    </div>

  </div>

</section>

<!-- CART UI (JS bağlanacak) -->
<aside class="cart">
  <h4>Sepet</h4>
  <div id="cartItems"></div>
  <div class="total">
    Toplam: <span id="total">0</span> ₺
  </div>
</aside>

</body>
</html>
