<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arman Deri</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}
body{background:#0a0a0a;color:#fff;overflow-x:hidden;}

header{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;
padding:20px 40px;
background:rgba(10,10,10,0.7);
backdrop-filter:blur(10px);
z-index:10;
}

.logo{font-family:'Playfair Display';font-size:22px;letter-spacing:2px;}

nav button{
background:none;border:none;color:#fff;
margin-left:20px;cursor:pointer;opacity:0.7;
transition:0.3s;
}
nav button:hover{opacity:1;color:#c8a45d;}

section{display:none;padding:120px 40px;}
.active{display:block;}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-family:'Playfair Display';
font-size:60px;
letter-spacing:3px;
}

.hero p{margin:20px 0;opacity:0.7;}

.btn{
padding:12px 24px;
margin:10px;
border:1px solid #c8a45d;
background:none;
color:#fff;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#c8a45d;
color:#000;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#151515;
padding:20px;
border-radius:10px;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-5px);
border:1px solid #c8a45d;
}

.cart{
position:fixed;
right:20px;
top:80px;
background:#151515;
padding:20px;
width:250px;
display:none;
}

.cart.active{display:block;}
</style>
</head>

<body>

<header>
<div class="logo">ARMAN DERİ</div>
<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('store')">Mağaza</button>
<button onclick="show('story')">Hikaye</button>
<button onclick="toggleCart()">Sepet (<span id="cartCount">0</span>)</button>
</nav>
</header>

<!-- HOME -->
<section id="home" class="active">
<div class="hero">
<h1>ARMAN DERİ</h1>
<p>Zanaatkârlığın en saf hali</p>
<button class="btn" onclick="show('store')">Koleksiyonu Keşfet</button>
<button class="btn" onclick="show('story')">Hikayemiz</button>
</div>
</section>

<!-- STORE -->
<section id="store">
<h2 style="font-family:'Playfair Display'">Koleksiyon</h2>
<div class="grid" id="productGrid"></div>
</section>

<!-- STORY -->
<section id="story">
<h2 style="font-family:'Playfair Display'">Hikayemiz</h2>
<p style="max-width:600px;opacity:0.7;margin-top:20px;">
1987’den beri el işçiliği ile üretilen deri ürünler...
Her parça bir ustanın imzasını taşır.
</p>
</section>

<!-- CART -->
<div class="cart" id="cartBox">
<h4>Sepet</h4>
<div id="cartItems"></div>
</div>

<script>
const products=[
{id:1,name:"Deri Ceket",price:1200},
{id:2,name:"Deri Çanta",price:800},
{id:3,name:"Cüzdan",price:300},
{id:4,name:"Kemer",price:200}
];

let cart=[];

function show(view){
document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
document.getElementById(view).classList.add('active');
}

function renderProducts(){
let grid=document.getElementById("productGrid");
grid.innerHTML="";
products.forEach(p=>{
grid.innerHTML+=`
<div class="card">
<h3>${p.name}</h3>
<p>${p.price} €</p>
<button class="btn" onclick="add(${p.id})">Sepete Ekle</button>
</div>`;
});
}

function add(id){
let item=products.find(p=>p.id===id);
cart.push(item);
document.getElementById("cartCount").innerText=cart.length;
renderCart();
}

function renderCart(){
let box=document.getElementById("cartItems");
box.innerHTML="";
cart.forEach(c=>{
box.innerHTML+=`<p>${c.name} - ${c.price}€</p>`;
});
}

function toggleCart(){
document.getElementById("cartBox").classList.toggle("active");
}

renderProducts();
</script>

</body>
</html>
