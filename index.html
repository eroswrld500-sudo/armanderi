<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Arman Deri | Luxury Experience Engine</title>

<style>
html,body{
margin:0;
overflow:hidden;
background:#0A0A0A;
font-family:system-ui;
color:#EDEDED;
}

/* UI LAYER */
#ui{
position:fixed;
inset:0;
pointer-events:none;
z-index:10;
}

.title{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-60%);
text-align:center;
letter-spacing:4px;
font-family:serif;
font-size:54px;
opacity:0.9;
}

.subtitle{
position:absolute;
top:58%;
left:50%;
transform:translateX(-50%);
color:#8A8A8A;
font-size:14px;
}

.buttons{
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:20px;
pointer-events:auto;
}

.btn{
border:1px solid #C8A45D;
background:transparent;
color:#C8A45D;
padding:12px 22px;
cursor:pointer;
transition:0.6s;
letter-spacing:1px;
}

.btn:hover{
background:#C8A45D;
color:#000;
transform:translateY(-2px);
}

/* CURSOR */
.cursor{
width:10px;height:10px;
border-radius:50%;
background:#C8A45D;
position:fixed;
transform:translate(-50%,-50%);
pointer-events:none;
z-index:999;
box-shadow:0 0 20px rgba(200,164,93,.6);
}

/* fallback */
.fallback{
display:none;
position:fixed;
inset:0;
background:url('https://images.unsplash.com/photo-1520975922284-9b7c3f1a7c88?auto=format&fit=crop&w=2000&q=80') center/cover;
}

.fallback::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.6);
}

</style>
</head>

<body>

<div id="ui">
  <div class="title">ARMAN DERİ</div>
  <div class="subtitle">Deri değil, karakter üretiyoruz.</div>

  <div class="buttons">
    <button class="btn">Koleksiyonu Keşfet</button>
    <button class="btn">3D Deneyimi İncele</button>
  </div>
</div>

<div class="cursor"></div>
<div class="fallback" id="fallback"></div>

<!-- THREE.JS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
/* =========================
   BASIC SETUP
========================= */
let scene, camera, renderer, mesh;
let mouseX = 0, mouseY = 0;
let targetX = 0, targetY = 0;

/* detect WebGL */
function webglAvailable(){
try{
const canvas = document.createElement("canvas");
return !!(window.WebGLRenderingContext &&
(canvas.getContext("webgl") || canvas.getContext("experimental-webgl")));
}catch(e){return false;}
}

/* =========================
   INIT 3D SCENE
========================= */
if(webglAvailable()){

scene = new THREE.Scene();

camera = new THREE.PerspectiveCamera(
45,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z = 3;

renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHTS */
const light = new THREE.DirectionalLight(0xc8a45d, 1.2);
light.position.set(2,2,2);
scene.add(light);

const ambient = new THREE.AmbientLight(0x222222);
scene.add(ambient);

/* LEATHER SHADER MATERIAL */
const uniforms = {
u_time:{value:0},
u_mouse:{value:new THREE.Vector2()}
};

const vertexShader = `
varying vec2 vUv;
varying float vWave;
uniform float u_time;
uniform vec2 u_mouse;

void main(){
vUv = uv;

vec3 pos = position;

float wave = sin(pos.x*3.0 + u_time)*0.05;
pos.z += wave;

vWave = wave;

gl_Position = projectionMatrix * modelViewMatrix * vec4(pos,1.0);
}
`;

const fragmentShader = `
varying vec2 vUv;
varying float vWave;
uniform float u_time;

void main(){

vec3 base = vec3(0.05,0.05,0.05);
vec3 gold = vec3(0.78,0.64,0.36);

float grain = fract(sin(dot(vUv.xy, vec2(12.9898,78.233))) * 43758.5453);

float mixVal = smoothstep(0.2,0.8,vUv.x + vUv.y*0.3);

vec3 color = mix(base, gold, mixVal);

color += grain*0.03;
color += vWave*0.2;

gl_FragColor = vec4(color,1.0);
}
`;

const geometry = new THREE.PlaneGeometry(3,3,128,128);

const material = new THREE.ShaderMaterial({
uniforms,
vertexShader,
fragmentShader
});

mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

/* MOUSE MOVE */
document.addEventListener("mousemove",(e)=>{
mouseX = (e.clientX/window.innerWidth)-0.5;
mouseY = (e.clientY/window.innerHeight)-0.5;
document.querySelector(".cursor").style.left = e.clientX+"px";
document.querySelector(".cursor").style.top = e.clientY+"px";
});

/* SCROLL DEPTH */
window.addEventListener("scroll",()=>{
camera.position.z = 3 + window.scrollY*0.002;
});

/* ANIMATE */
function animate(){
requestAnimationFrame(animate);

targetX += (mouseX - targetX)*0.05;
targetY += (mouseY - targetY)*0.05;

mesh.rotation.y = targetX*0.5;
mesh.rotation.x = targetY*0.3;

uniforms.u_time.value += 0.02;
uniforms.u_mouse.value.set(mouseX,mouseY);

renderer.render(scene,camera);
}
animate();

/* RESIZE */
window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

}

/* =========================
   FALLBACK MODE
========================= */
else{
document.getElementById("fallback").style.display="block";
}

/* =========================
   MICRO UX
========================= */
document.querySelectorAll(".btn").forEach(btn=>{
btn.addEventListener("mouseenter",()=>{
btn.style.boxShadow="0 0 20px rgba(200,164,93,0.4)";
});
});
</script>

</body>
</html>
