<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARMAN DERİ | Haute Couture Leather</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (Ultra Lüks Stil İçin) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js (Tüm Tıklamaları ve Fonksiyonları Sıfır Hatayla Çalıştırmak İçin) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { gold: '#c5a880', dark: '#0a0a0a' },
                    fontFamily: { cinzel: ['Cinzel', 'serif'], montserrat: ['Montserrat', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="bg-white text-neutral-900 antialiased" x-data="{
    cart: [],
    cartOpen: false,
    authOpen: false,
    authTab: 'login',
    activeCat: 'all',
    activeTarget: 'all',
    products: [
        { id: 1, cat: 'mont', target: 'erkek', name: 'Classic Biker', price: 8499, img: 'https://images.unsplash.com/photo-1551028719-00167b16eac5?q=80&w=600' },
        { id: 2, cat: 'mont', target: 'kadin', name: 'Slim Bomber', price: 7999, img: 'https://images.unsplash.com/photo-1521223890158-f9f7c3d5d504?q=80&w=600' },
        { id: 3, cat: 'mont', target: 'cocuk', name: 'Mini Rebel', price: 4599, img: 'https://images.unsplash.com/photo-1519457431-44ccd64a579b?q=80&w=600' },
        { id: 4, cat: 'yelek', target: 'erkek', name: 'Gothic Vest', price: 5499, img: 'https://images.unsplash.com/photo-1617137968427-85924c800a22?q=80&w=600' },
        { id: 5, cat: 'yelek', target: 'kadin', name: 'Boho Fringe', price: 4999, img: 'https://images.unsplash.com/photo-1485462537746-965f33f7f6a7?q=80&w=600' },
        { id: 6, cat: 'sapka', target: 'erkek', name: 'Flat Cap', price: 1899, img: 'https://images.unsplash.com/photo-1534215754734-18e55d13ce35?q=80&w=600' }
    ],
    addToCart(p) {
        let exist = this.cart.find(item => item.id === p.id);
        if (exist) { exist.qty++ } else { this.cart.push({...p, qty: 1}) }
        this.cartOpen = true;
    },
    removeFromCart(id) {
        this.cart = this.cart.filter(item => item.id !== id);
    },
    get total() {
        return this.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
    },
    get cartCount() {
        return this.cart.reduce((sum, item) => sum + item.qty, 0);
    }
}">

    <!-- HEADER -->
    <header class="fixed top-0 left-0 w-full bg-white/90 backdrop-blur-md border-b border-neutral-100 z-50">
        <div class="max-w-7xl mx-auto px-6 h-24 flex justify-between items-center">
            <a href="#" class="font-cinzel text-2xl font-bold tracking-[4px]">ARMAN<span class="text-gold">.</span>DERİ</a>
            <div class="flex items-center gap-8">
                <button @click="authOpen = true" class="text-xs font-bold uppercase tracking-widest hover:text-gold transition-colors">Giriş Yap</button>
                <button @click="cartOpen = true" class="relative p-2">
                    <svg class="w-6 h-6 stroke-current fill-none stroke-[1.5]" viewBox="0 0 24 24">
                        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0" />
                    </svg>
                    <span x-show="cartCount > 0" x-text="cartCount" class="absolute -top-1 -right-1 bg-dark text-white text-[9px] font-bold w-5 h-5 rounded-full flex items-center justify-center"></span>
                </button>
            </div>
        </div>
    </header>

    <!-- HERO SECTION -->
    <section class="pt-44 pb-20 bg-neutral-50 text-center">
        <div class="max-w-3xl mx-auto px-6">
            <span class="text-xs font-bold uppercase tracking-[6px] text-gold block mb-4">Haute Couture Leather</span>
            <h1 class="font-cinzel text-5xl md:text-7xl font-light tracking-wide uppercase mb-6 leading-tight">ZAMANSIZ<br><span class="font-black text-dark">PREMİUM STİL.</span></h1>
            <p class="text-neutral-500 font-light text-sm md:text-base leading-relaxed max-w-xl mx-auto">En üst kalite el işçiliğiyle üretilen modern deri mont, yelek ve şapka koleksiyonu.</p>
        </div>
    </section>

    <!-- FILTERS -->
    <section class="max-w-7xl mx-auto px-6 pt-16 flex flex-col items-center gap-6 border-t border-neutral-100">
        <div class="flex flex-wrap gap-3 justify-center">
            <template x-for="c in [['all','Tüm Ürünler'], ['mont','Deri Mont'], ['yelek','Deri Yelek'], ['sapka','Deri Şapka']]">
                <button @click="activeCat = c[0]" :class="activeCat === c[0] ? 'bg-dark text-white border-dark' : 'border-neutral-200 hover:border-dark'" class="border px-6 py-2.5 text-xs font-bold uppercase tracking-widest transition-all" x-text="c[1]"></button>
            </template>
        </div>
        <div class="flex gap-6 justify-center">
            <template x-for="t in [['all','Herkes İçin'], ['erkek','Erkek'], ['kadin','Kadın'], ['cocuk','Çocuk']]">
                <button @click="activeTarget = t[0]" :class="activeTarget === t[0] ? 'text-dark border-b border-gold' : 'text-neutral-400'" class="pb-1 text-xs font-bold uppercase tracking-widest hover:text-dark transition-all" x-text="t[1]"></button>
            </template>
        </div>
    </section>

    <!-- PRODUCTS GRID -->
    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <template x-for="p in products" :key="p.id">
                <div x-show="(activeCat === 'all' || p.cat === activeCat) && (activeTarget === 'all' || p.target === activeTarget)" class="group border border-neutral-50 p-4 flex flex-col hover:shadow-xl hover:border-gold/30 transition-all duration-500 bg-white">
                    <div class="aspect-[3/4] bg-neutral-100 overflow-hidden mb-6">
                        <img :src="p.img" :alt="p.name" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                    </div>
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="text-[10px] font-bold uppercase tracking-widest text-gold" x-text="'Deri ' + p.cat"></span>
                            <h3 class="font-cinzel text-xl font-bold uppercase mt-1" x-text="p.name"></h3>
                            <span class="text-[11px] text-neutral-400 block mt-1" x-text="p.target.toUpperCase() + ' KOLEKSİYONU'"></span>
                        </div>
                        <span class="text-lg font-bold" x-text="'₺' + p.price.toLocaleString('tr-TR')"></span>
                    </div>
                    <button @click="addToCart(p)" class="w-full py-4 border border-dark text-xs font-bold uppercase tracking-widest hover:bg-dark hover:text-white transition-all duration-300">Sepete Ekle</button>
                </div>
            </template>
        </div>
    </main>

    <!-- CART DRAWER -->
    <div x-show="cartOpen" class="fixed inset-0 z-50 overflow-hidden" style="display: none;">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" @click="cartOpen = false"></div>
        <div class="absolute inset-y-0 right-0 max-w-full flex">
            <div class="w-screen max-w-md bg-white shadow-2xl flex flex-col">
                <div class="p-6 border-b border-neutral-100 flex justify-between items-center">
                    <h3 class="font-cinzel text-xl font-bold uppercase tracking-wider">Sepetiniz</h3>
                    <button @click="cartOpen = false" class="text-2xl hover:text-gold">&times;</button>
                </div>
                <div class="flex-1 overflow-y-auto p-6 space-y-6">
                    <template x-show="cart.length === 0">
                        <p class="text-center text-neutral-400 py-12">Sepetiniz henüz boş.</p>
                    </template>
                    <template x-for="item in cart" :key="item.id">
                        <div class="flex gap-4 items-center border-b border-neutral-100 pb-4">
                            <img :src="item.img" class="w-16 h-20 object-cover bg-neutral-50">
                            <div class="flex-1">
                                <h4 class="font-cinzel text-sm font-bold uppercase" x-text="item.name"></h4>
                                <p class="text-xs text-gold font-semibold mt-1" x-text="item.qty + ' Adet x ₺' + item.price.toLocaleString('tr-TR')"></p>
                                <button @click="removeFromCart(item.id)" class="text-[10px] font-bold text-red-500 uppercase mt-2 tracking-wider">Kaldır</button>
                            </div>
                        </div>
                    </template>
                </div>
                <div class="p-6 border-t border-neutral-100 bg-neutral-50">
                    <div class="flex justify-between text-lg font-bold mb-6">
                        <span>Toplam:</span>
                        <span x-text="'₺' + total.toLocaleString('tr-TR')"></span>
                    </div>
                    <button class="w-full py-4 bg-dark text-white text-xs font-bold uppercase tracking-widest hover:bg-gold transition-colors">Ödemeye Geç (Stripe)</button>
                </div>
            </div>
        </div>
    </div>

    <!-- AUTH MODAL -->
    <div x-show="authOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4" style="display: none;">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" @click="authOpen = false"></div>
        <div class="bg-white max-w-md w-full p-8 shadow-2xl relative z-10">
            <button @click="authOpen = false" class="absolute top-4 right-4 text-2xl hover:text-gold">&times;</button>
            <div class="flex gap-6 border-b border-neutral-100 mb-8">
                <button @click="authTab = 'login'" :class="authTab === 'login' ? 'text-dark border-b-2 border-gold' : 'text-neutral-400'" class="pb-2 font-cinzel text-lg font-bold uppercase">Giriş</button>
                <button @click="authTab = 'register'" :class="authTab === 'register' ? 'text-dark border-b-2 border-gold' : 'text-neutral-400'" class="pb-2 font-cinzel text-lg font-bold uppercase">Kayıt</button>
            </div>
            
            <!-- Login Form -->
            <form x-show="authTab === 'login'" class="space-y-5">
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-bold uppercase tracking-wider">E-Posta</label>
                    <input type="email" required class="p-3 border border-neutral-200 bg-neutral-50 focus:bg-white focus:border-dark text-sm outline-none" placeholder="ornek@mail.com">
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-bold uppercase tracking-wider">Şifre</label>
                    <input type="password" required class="p-3 border border-neutral-200 bg-neutral-50 focus:bg-white focus:border-dark text-sm outline-none" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full py-4 bg-dark text-white text-xs font-bold uppercase tracking-widest hover:bg-gold transition-colors">Giriş Yap</button>
            </form>

            <!-- Register Form -->
            <form x-show="authTab === 'register'" class="space-y-5" style="display: none;">
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-bold uppercase tracking-wider">Ad Soyad</label>
                    <input type="text" required class="p-3 border border-neutral-200 bg-neutral-50 focus:bg-white focus:border-dark text-sm outline-none" placeholder="Ahmet Arman">
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-bold uppercase tracking-wider">E-Posta</label>
                    <input type="email" required class="p-3 border border-neutral-200 bg-neutral-50 focus:bg-white focus:border-dark text-sm outline-none" placeholder="ornek@mail.com">
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-bold uppercase tracking-wider">Şifre</label>
                    <input type="password" required minlength="6" class="p-3 border border-neutral-200 bg-neutral-50 focus:bg-white focus:border-dark text-sm outline-none" placeholder="En az 6 karakter">
                </div>
                <button type="submit" class="w-full py-4 bg-dark text-white text-xs font-bold uppercase tracking-widest hover:bg-gold transition-colors">Kayıt Ol</button>
            </form>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="bg-dark text-white py-16 text-center">
        <div class="max-w-7xl mx-auto px-6">
            <a href="#" class="font-cinzel text-2xl font-bold tracking-[4px] text-white block mb-4">ARMAN<span class="text-gold">.</span>DERİ</a>
            <p class="text-xs text-neutral-500 tracking-wider">&copy; 2024 ARMAN DERİ. Tüm Hakları Saklıdır. Luxury Experience.</p>
        </div>
    </footer>

</body>
</html>
