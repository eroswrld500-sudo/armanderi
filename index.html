<!DOCTYPE html>
<html lang="tr" style="scroll-behavior: smooth;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arman Deri</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Navbar */
        header { position: fixed; width: 100%; padding: 25px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid #222; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; letter-spacing: 4px; cursor: pointer; text-decoration: none; color: #fff; }
        .nav-links a { color: #fff; text-decoration: none; font-size: 0.85rem; letter-spacing: 2px; margin-left: 30px; transition: opacity 0.3s; opacity: 0.7; }
        .nav-links a:hover { opacity: 1; }

        /* Sections */
        section { padding: 100px 5%; min-height: auto; }
        
        /* Hero & Koleksiyon Galeri */
        #koleksiyon { padding-top: 150px; text-align: center; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 50px; }
        .img-square { width: 100%; aspect-ratio: 1 / 1; background: #1a1a1a; display: flex; align-items: center; justify-content: center; border: 1px solid #333; transition: 0.4s; }
        .img-square:hover { border-color: #fff; }
        
        /* Mağaza */
        #magaza h2 { font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 50px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .product-card { background: #111; padding: 30px; border: 1px solid #333; text-align: center; transition: 0.4s; }
        .product-card:hover { border-color: #fff; }
        .buy-btn { margin-top: 20px; padding: 12px 30px; background: #fff; color: #000; border: none; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; }

        /* İletişim */
        #iletisim { text-align: center; background: #050505; }
        input, textarea { width: 100%; max-width: 500px; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; }

        /* Footer */
        footer { padding: 50px 5%; text-align: center; border-top: 1px solid #222; color: #444; font-size: 0.8rem; letter-spacing: 1px; }
    </style>
</head>
<body>

    <header>
        <a href="#koleksiyon" class="logo">ARMAN DERİ</a>
        <nav class="nav-links">
            <a href="#koleksiyon">KOLEKSİYON</a>
            <a href="#magaza">MAĞAZA</a>
            <a href="#iletisim">İLETİŞİM</a>
        </nav>
    </header>

    <!-- Koleksiyon -->
    <section id="koleksiyon">
        <h2 style="font-family: 'Playfair Display'; font-size: 3rem;">Koleksiyon</h2>
        <div class="gallery-grid">
            <!-- Buraya kendi fotoğraflarını ekleyeceksin -->
            <div class="img-square">Ürün Görseli 1</div>
            <div class="img-square">Ürün Görseli 2</div>
            <div class="img-square">Ürün Görseli 3</div>
            <div class="img-square">Ürün Görseli 4</div>
        </div>
    </section>

    <!-- Mağaza -->
    <section id="magaza">
        <h2>Seçkin Parçalar</h2>
        <div class="grid">
            <div class="product-card">
                <h3>Venezia Tote</h3>
                <p style="margin: 10px 0; color: #888;">4.200 TL</p>
                <button class="buy-btn">SATIN AL</button>
            </div>
            <div class="product-card">
                <h3>Classic Bifold</h3>
                <p style="margin: 10px 0; color: #888;">850 TL</p>
                <button class="buy-btn">SATIN AL</button>
            </div>
            <div class="product-card">
                <h3>Urban Briefcase</h3>
                <p style="margin: 10px 0; color: #555;">5.500 TL</p>
                <button class="buy-btn">SATIN AL</button>
            </div>
        </div>
    </section>

    <!-- İletişim -->
    <section id="iletisim">
        <h2 style="margin-bottom: 30px; font-family: 'Playfair Display';">Bizimle İletişime Geçin</h2>
        <form onsubmit="alert('Mesajınız gönderildi!'); return false;">
            <input type="text" placeholder="Adınız" required><br>
            <input type="email" placeholder="E-posta" required><br>
            <textarea placeholder="Mesajınız" rows="5"></textarea><br>
            <button type="submit" class="buy-btn" style="width: auto; padding: 15px 50px;">GÖNDER</button>
        </form>
    </section>

    <footer>
        &copy; 2026 ARMAN DERİ. TÜM HAKLARI SAKLIDIR.
    </footer>

</body>
</html>
